<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>franssiss</title>
	<link href="stylesheets/franssiss.css" rel="stylesheet">
</head>
<body>
	<video id="backgroundVideo" class="background-video" autoplay muted loop playsinline aria-hidden="true"></video>
	<div class="video-overlay" aria-hidden="true"></div>

	<button id="refreshBtn" class="btn-refresh" aria-label="Refresh page">
		<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
			<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path>
		</svg>
	</button>

	<button id="fullscreenBtn" class="btn-fullscreen" aria-label="Toggle fullscreen">
		<span class="icon-fullscreen" aria-hidden="true">
			<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
				<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"></path>
			</svg>
		</span>
		<span class="icon-fullscreen-exit" aria-hidden="true">
			<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
				<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"></path>
			</svg>
		</span>
	</button>

	<div class="container">
		<h1>franssiss</h1>
        
		<div class="controls">
			<button id="playBtn" class="btn-play" aria-label="Play/Pause">
				<span class="icon-play" aria-hidden="true">
					<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
						<polygon points="6 4 20 12 6 20"></polygon>
					</svg>
				</span>
				<span class="icon-pause" aria-hidden="true">
					<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
						<rect x="6" y="4" width="4" height="16"></rect>
						<rect x="14" y="4" width="4" height="16"></rect>
					</svg>
				</span>
			</button>
            
			<div class="volume-wrapper">
				<svg class="volume-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
					<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.26 2.5-4.02z"></path>
				</svg>
				<input type="range" id="volume" min="0" max="100" value="70" class="volume-slider">
			</div>
		</div>
        
		<audio id="audio" preload="auto" autoplay muted>
			<source src="audio/web/sea.mp3" type="audio/mpeg">
			<source src="audio/sea.aif" type="audio/aiff">
			Your browser does not support the audio element.
		</audio>
	</div>

	<a class="enter-site-link" href="wacko.html" aria-label="Enter site">&lt;enter site&gt;</a>
    
	<script>
		const backgroundVideo = document.getElementById('backgroundVideo');
		const audio = document.getElementById('audio');
		const playBtn = document.getElementById('playBtn');
		const volumeSlider = document.getElementById('volume');

		// Load videos dynamically from videos.json
		fetch('videos.json')
			.then(response => response.json())
			.then(videoFiles => {
				if (videoFiles.length > 0) {
					const randomVideo = videoFiles[Math.floor(Math.random() * videoFiles.length)];
					backgroundVideo.src = randomVideo;
					backgroundVideo.load();
					backgroundVideo.play().catch(() => {
						// Autoplay may be restricted in some browsers even when muted.
					});
				}
			})
			.catch(err => console.error('Failed to load videos.json:', err));
        
		playBtn.addEventListener('click', () => {
			if (audio.paused) {
				audio.play().then(() => {
					playBtn.classList.add('playing');
					playBtn.setAttribute('aria-label', 'Pause audio');
				});
			} else {
				audio.pause();
				playBtn.classList.remove('playing');
				playBtn.setAttribute('aria-label', 'Play audio');
			}
		});
        
		volumeSlider.addEventListener('input', (e) => {
			audio.volume = e.target.value / 100;
		});
        
		audio.addEventListener('ended', () => {
			playBtn.classList.remove('playing');
			playBtn.setAttribute('aria-label', 'Play audio');
		});
        
		audio.volume = 0.7;

		// Keep audio playing (muted by default due to browser policy)
		audio.play().catch(() => {});

		// Unmute and update button on any user interaction
		const handleUserInteraction = () => {
			if (audio.muted) {
				audio.muted = false;
				if (audio.paused) {
					audio.play().catch(() => {});
				}
				if (!playBtn.classList.contains('playing')) {
					playBtn.classList.add('playing');
					playBtn.setAttribute('aria-label', 'Pause audio');
				}
			}
			// Remove listener after first use to avoid repeated calls
			document.removeEventListener('click', handleUserInteraction);
			document.removeEventListener('touchstart', handleUserInteraction);
		};

		document.addEventListener('click', handleUserInteraction);
		document.addEventListener('touchstart', handleUserInteraction);

		// Refresh button handler - preserve fullscreen state
		const refreshBtn = document.getElementById('refreshBtn');
		refreshBtn.addEventListener('click', () => {
			if (document.fullscreenElement) {
				sessionStorage.setItem('wasFullscreen', 'true');
			}
			location.reload();
		});

		// Fullscreen button handler
		const fullscreenBtn = document.getElementById('fullscreenBtn');
		fullscreenBtn.addEventListener('click', () => {
			if (!document.fullscreenElement) {
				document.documentElement.requestFullscreen().catch(err => {
					console.error('Fullscreen request failed:', err);
				});
				fullscreenBtn.classList.add('fullscreen-active');
				sessionStorage.setItem('wasFullscreen', 'true');
			} else {
				document.exitFullscreen();
				fullscreenBtn.classList.remove('fullscreen-active');
				sessionStorage.removeItem('wasFullscreen');
			}
		});

		document.addEventListener('fullscreenchange', () => {
			if (!document.fullscreenElement) {
				fullscreenBtn.classList.remove('fullscreen-active');
				sessionStorage.removeItem('wasFullscreen');
			} else {
				fullscreenBtn.classList.add('fullscreen-active');
			}
		});

		// Restore fullscreen if it was active before refresh
		if (sessionStorage.getItem('wasFullscreen') === 'true') {
			document.documentElement.requestFullscreen().catch(err => {
				console.error('Failed to restore fullscreen:', err);
				sessionStorage.removeItem('wasFullscreen');
			});
		}
	</script>
</body>
</html>
